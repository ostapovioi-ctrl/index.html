<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROLLING KEDR Admin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--tg-theme-bg-color, #0a0f1e);
            color: var(--tg-theme-text-color, #fff);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 12px;
        }
        .app {
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 16px;
        }
        .tab {
            background: var(--tg-theme-secondary-bg-color, #121a2f);
            border: none;
            color: var(--tg-theme-text-color, #fff);
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .tab.active {
            opacity: 1;
            background: var(--tg-theme-button-color, #2a3a6e);
            color: var(--tg-theme-button-text-color, #fff);
        }
        .panel {
            display: none;
        }
        .panel.active {
            display: block;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, #121a2f);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 16px;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .stat-box {
            background: var(--tg-theme-bg-color, #1a1f33);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }
        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #6e8efb;
        }
        .btn {
            background: var(--tg-theme-button-color, #2a3a6e);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 14px;
            padding: 14px 18px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        input, select {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            background: var(--tg-theme-bg-color, #1a1f33);
            color: var(--tg-theme-text-color, #fff);
            margin-bottom: 12px;
        }
        .badge {
            background: #6e8efb20;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        .danger-btn {
            background: #ff4757;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>🏀 ROLLING KEDR</h1>
        <span class="badge" id="user-role"></span>
    </div>
    <div class="tabs">
        <button class="tab active" data-tab="dashboard">📊 Дашборд</button>
        <button class="tab" data-tab="giveaways">🎁 Розыгрыши</button>
        <button class="tab" data-tab="sponsors">🤝 Спонсоры</button>
        <button class="tab" data-tab="emojis">😊 Эмодзи</button>
        <button class="tab" data-tab="users">👥 Пользователи</button>
    </div>

    <!-- Dashboard Panel -->
    <div id="dashboard" class="panel active">
        <div class="stat-grid">
            <div class="stat-box"><div class="stat-number" id="stat-giveaways">-</div><div>Активных</div></div>
            <div class="stat-box"><div class="stat-number" id="stat-participants">-</div><div>Участников</div></div>
            <div class="stat-box"><div class="stat-number" id="stat-winners">-</div><div>Победителей</div></div>
            <div class="stat-box"><div class="stat-number" id="stat-duels">-</div><div>Дуэлей</div></div>
        </div>
        <button class="btn" onclick="refreshStats()">🔄 Обновить</button>
    </div>

    <!-- Giveaways Panel -->
    <div id="giveaways" class="panel">
        <div id="giveaways-list"></div>
        <button class="btn" onclick="showCreateGiveawayForm()">➕ Новый розыгрыш</button>
    </div>

    <!-- Sponsors Panel -->
    <div id="sponsors" class="panel">
        <div id="sponsors-list"></div>
        <button class="btn" onclick="showAddSponsorForm()">➕ Добавить спонсора</button>
    </div>

    <!-- Emojis Panel -->
    <div id="emojis" class="panel">
        <div id="emojis-list"></div>
    </div>

    <!-- Users Panel -->
    <div id="users" class="panel">
        <div id="users-list"></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.setHeaderColor('secondary_bg_color');

    // === НАСТРОЙКИ ===
    const API_BASE = 'https://YOUR_BOT_API_URL'; // Замените на публичный URL вашего бота (ngrok)
    const BOT_TOKEN = ''; // не используется напрямую, но нужен для проверки подписи на сервере

    let currentUser = tg.initDataUnsafe?.user || {};

    // === УТИЛИТЫ ===
    async function apiCall(endpoint, method = 'GET', body = null) {
        const headers = { 'Content-Type': 'application/json' };
        const options = { method, headers };
        if (body) options.body = JSON.stringify(body);
        const response = await fetch(`${API_BASE}${endpoint}`, options);
        return await response.json();
    }

    // === ИНИЦИАЛИЗАЦИЯ ===
    async function init() {
        if (!API_BASE.includes('YOUR_BOT_API_URL')) {
            await loadStats();
            await loadGiveaways();
            await loadSponsors();
            await loadEmojis();
            await loadUsers();
        } else {
            document.body.innerHTML = '<h2>Ошибка: укажите API_BASE в коде Mini App</h2>';
        }
    }

    async function loadStats() {
        const data = await apiCall('/api/stats');
        document.getElementById('stat-giveaways').innerText = data.active_giveaways || 0;
        document.getElementById('stat-participants').innerText = data.total_participants || 0;
        document.getElementById('stat-winners').innerText = data.winners_today || 0;
        document.getElementById('stat-duels').innerText = data.duels_today || 0;
    }

    async function loadGiveaways() {
        const data = await apiCall('/api/giveaways');
        const container = document.getElementById('giveaways-list');
        if (!data.giveaways || data.giveaways.length === 0) {
            container.innerHTML = '<p>Нет активных розыгрышей</p>';
            return;
        }
        container.innerHTML = data.giveaways.map(g => `
            <div class="card">
                <div><b>${g.id}</b> (${g.slots_taken}/${g.slots_total})</div>
                <div class="list-item">
                    <span>Статус: ${g.status}</span>
                    <button onclick="endGiveaway('${g.id}')">🏁 Завершить</button>
                </div>
            </div>
        `).join('');
    }

    async function loadSponsors() {
        const data = await apiCall('/api/sponsors');
        const container = document.getElementById('sponsors-list');
        if (!data.sponsors || data.sponsors.length === 0) {
            container.innerHTML = '<p>Спонсоры не добавлены</p>';
            return;
        }
        container.innerHTML = data.sponsors.map(s => `
            <div class="list-item">
                <span><b>${s.name}</b> (@${s.username})</span>
                <span>Участий: ${s.total_giveaways}</span>
            </div>
        `).join('');
    }

    async function loadEmojis() {
        const data = await apiCall('/api/emojis');
        const container = document.getElementById('emojis-list');
        if (!data.emojis || data.emojis.length === 0) {
            container.innerHTML = '<p>Нет сохранённых эмодзи</p>';
            return;
        }
        container.innerHTML = data.emojis.map(e => `
            <div class="list-item">
                <span>:${e.alias}:</span>
                <code>${e.custom_emoji_id}</code>
            </div>
        `).join('');
    }

    async function loadUsers() {
        const data = await apiCall('/api/users');
        const container = document.getElementById('users-list');
        if (!data.users || data.users.length === 0) {
            container.innerHTML = '<p>Нет пользователей</p>';
            return;
        }
        container.innerHTML = data.users.map(u => `
            <div class="list-item">
                <span>${u.first_name} (@${u.username || 'нет'})</span>
                <select onchange="updateRole(${u.user_id}, this.value)">
                    <option ${u.role === 'user' ? 'selected' : ''}>user</option>
                    <option ${u.role === 'admin' ? 'selected' : ''}>admin</option>
                    <option ${u.role === 'banned' ? 'selected' : ''}>banned</option>
                </select>
            </div>
        `).join('');
    }

    window.updateRole = async (userId, newRole) => {
        await apiCall('/api/user/role', 'POST', { user_id: userId, role: newRole });
        loadUsers();
    };

    window.endGiveaway = async (giveawayId) => {
        await apiCall('/api/giveaway/end', 'POST', { giveaway_id: giveawayId });
        loadGiveaways();
    };

    // === НАВИГАЦИЯ ===
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(tab.dataset.tab).classList.add('active');
        });
    });

    init();
</script>
</body>
</html>
